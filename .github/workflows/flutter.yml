name: Flutter

on:
  pull_request:
  push:
    branches:
      - flutter

jobs:
  build_flutter:
    name: Build flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-java@v1
        with:
          java-version: "12.x"

      - uses: subosito/flutter-action@v1
        with:
          flutter-version: "2.0.5"

      - name: Build signed APK
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ../../keystore.jks
        working-directory: zenith_flutter
        run: |
          echo $ANDROID_KEYSTORE | base64 -d > keystore.jks
          flutter pub get
          flutter build apk --dart-define GIT_COMMIT_HASH=$(git rev-parse HEAD)

      - uses: actions/upload-artifact@v2
        with:
          name: zenith-apk
          path: zenith_flutter/build/app/outputs/flutter-apk/app-release.apk
