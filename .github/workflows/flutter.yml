name: Flutter

on:
  pull_request:
  push:
    branches:
      - flutter

jobs:
  build_flutter:
    name: Build flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-java@v1
        with:
          java-version: "12.x"

      - uses: subosito/flutter-action@v1
        with:
          flutter-version: "2.0.5"

      - run: flutter pub get
        working-directory: zenith_flutter

      - run: flutter build apk
        working-directory: zenith_flutter

      - uses: actions/upload-artifact@v2
        with:
          name: zenith-apk
          path: zenith_flutter/build/app/outputs/flutter-apk/app-release.apk
